<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FA504D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C61;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge> 
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/> 
      </feMerge>
    </filter>
  </defs>

  <!-- Background: Simple Rounded Square (Brand Color) -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="url(#brandGradient)" filter="url(#shadow)"/>

  <!-- Icon: Bold White Location Pin (High Contrast) -->
  <path d="M256 96c-70.7 0-128 57.3-128 128 0 88.3 128 224 128 224s128-135.7 128-224c0-70.7-57.3-128-128-128zm0 176c-26.5 0-48-21.5-48-48s21.5-48 48-48 48 21.5 48 48-21.5 48-48 48z" fill="white"/>
</svg>
