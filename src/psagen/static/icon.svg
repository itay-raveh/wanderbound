<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9eff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d8bd4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Book Cover/Backing -->
  <rect x="40" y="80" width="432" height="352" rx="20" ry="20" fill="#252540" />
  
  <!-- Pages -->
  <path d="M256 100 L60 100 Q40 100 40 120 L40 412 Q40 432 60 432 L256 432 Z" fill="#e5e7eb" />
  <path d="M256 100 L452 100 Q472 100 472 120 L472 412 Q472 432 452 432 L256 432 Z" fill="#f3f4f6" />
  
  <!-- Center Fold/Spine -->
  <rect x="254" y="100" width="4" height="332" fill="#d1d5db" />

  <!-- Left Page: Photos -->
  <rect x="70" y="130" width="150" height="100" rx="4" fill="#4a9eff" opacity="0.2" />
  <rect x="80" y="140" width="130" height="80" rx="2" fill="#4a9eff" />
  
  <rect x="70" y="250" width="70" height="70" rx="4" fill="#ffd700" opacity="0.2" />
  <rect x="78" y="258" width="54" height="54" rx="2" fill="#ffd700" />
  
  <rect x="150" y="250" width="70" height="70" rx="4" fill="#ff007f" opacity="0.2" />
  <rect x="158" y="258" width="54" height="54" rx="2" fill="#ff007f" />

  <!-- Right Page: Map Route -->
  <circle cx="300" cy="350" r="8" fill="#4a9eff" />
  <circle cx="420" cy="180" r="8" fill="#c10015" />
  
  <!-- Dotted Route Line -->
  <path d="M300 350 Q 320 250, 360 280 T 420 180" fill="none" stroke="#252540" stroke-width="4" stroke-dasharray="8,6" stroke-linecap="round" />
  
  <!-- Location Pin on Top Right -->
  <path d="M420 180 L420 150 M405 165 L435 165" stroke="none" /> <!-- Spacer -->
  <circle cx="420" cy="180" r="4" fill="white" />
  
</svg>
