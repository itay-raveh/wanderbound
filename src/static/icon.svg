<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa504d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d43f4c;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15" result="blur"/>
      <feOffset dx="0" dy="10" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.2"/>
      <feComposite in2="offsetBlur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#grad)" filter="url(#shadow)" />
  
  <!-- Open Book -->
  <path d="M110 370 L402 370 C418 370 432 356 432 340 L432 120 C432 105 420 95 405 95 L256 120 L107 95 C92 95 80 105 80 120 L80 340 C80 356 94 370 110 370 Z" 
        fill="white" opacity="0.95" />
        
  <!-- Book Spine Shadow -->
  <path d="M256 120 L256 370" stroke="#fa504d" stroke-width="4" opacity="0.2" />

  <!-- Path / Route Line -->
  <path d="M140 280 Q200 180 256 220 T372 200" 
        fill="none" stroke="#fa504d" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
        
  <!-- Location Pin -->
  <circle cx="372" cy="200" r="16" fill="#fa504d" />
  <path d="M140 280 L140 280" stroke="#fa504d" stroke-width="24" stroke-linecap="round" />

</svg>
