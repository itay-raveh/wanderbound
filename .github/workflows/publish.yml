name: Publish

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

permissions:
  packages: write
  contents: read

jobs:
  build-backend:
    if: >-
      github.event_name == 'push' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/backend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
      - id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-frontend:
    runs-on: ubuntu-latest
    needs: build-backend
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_SERVER: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ci
      POSTGRES_PASSWORD: ci
      POSTGRES_DB: ci
      SECRET_KEY: ci
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v7
      - uses: oven-sh/setup-bun@v2
      - run: uv sync --all-packages
      - run: bun install --frozen-lockfile
        working-directory: frontend
      - run: bunx playwright install --with-deps chromium
        working-directory: frontend
      - name: Generate offline assets
        run: |
          uv run scripts/generate_countries.py
          uv run scripts/generate_fonts.py
          uv run scripts/generate_topo.py
          bun scripts/generate-og-image.ts
      - name: Generate landing screenshots
        run: |
          uv run python scripts/generate_openapi.py > frontend/openapi.json
          (cd backend && uv run alembic upgrade head)
          (cd backend && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000) &
          timeout 60 bash -c 'until curl -sf http://localhost:8000/api/v1/health; do sleep 1; done'
          (cd frontend && bun run dev) &
          timeout 60 bash -c 'until curl -sf http://localhost:5173; do sleep 1; done'
          bun scripts/generate-landing.ts
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/frontend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-contexts: |
            openapi=docker-image://${{ env.REGISTRY }}/${{ github.repository }}/backend@${{ needs.build-backend.outputs.digest }}
          build-args: |
            VITE_MAX_UPLOAD_GB=${{ vars.VITE_MAX_UPLOAD_GB }}
            VITE_MAPBOX_TOKEN=${{ vars.VITE_MAPBOX_TOKEN }}
            VITE_GOOGLE_CLIENT_ID=${{ vars.VITE_GOOGLE_CLIENT_ID }}
            VITE_CONTACT_EMAIL=${{ vars.VITE_CONTACT_EMAIL }}
            VITE_GITHUB_URL=${{ vars.VITE_GITHUB_URL }}
            VITE_AUTHOR_NAME=${{ vars.VITE_AUTHOR_NAME }}
            VITE_AUTHOR_URL=${{ vars.VITE_AUTHOR_URL }}
            VITE_SENTRY_DSN=${{ vars.VITE_SENTRY_DSN }}
            VITE_FRONTEND_URL=${{ vars.VITE_FRONTEND_URL }}
            VITE_MICROSOFT_CLIENT_ID=${{ vars.VITE_MICROSOFT_CLIENT_ID }}
            SENTRY_ORG=${{ vars.SENTRY_ORG }}
            SENTRY_FRONTEND_PROJECT=${{ vars.SENTRY_FRONTEND_PROJECT }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
