name: Publish

on:
  push:
    tags: ["v*.*.*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      APP_IMAGE: ghcr.io/itay-raveh/wanderbound
      DOCKER_BUILD_RECORD_UPLOAD: false
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true
          fetch-depth: 0

      - name: Validate stable release tag
        id: version
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Release tag must match vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi
          echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "patch=${GITHUB_REF_NAME##*.}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build release image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: ${{ env.APP_IMAGE }}:${{ steps.version.outputs.value }}
          build-args: APP_VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push exact release tag
        run: docker push "$APP_IMAGE:${{ steps.version.outputs.value }}"

      - uses: taiki-e/install-action@v2
        if: steps.version.outputs.patch == '0'
        with:
          tool: git-cliff

      - name: Create GitHub release
        if: steps.version.outputs.patch == '0'
        run: |
          git cliff --current --strip header > /tmp/release-notes.md
          gh release create "$GITHUB_REF_NAME" --verify-tag \
            --notes-file /tmp/release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
