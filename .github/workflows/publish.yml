name: Publish

on:
  push:
    tags: ["v*.*.*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      APP_IMAGE: ghcr.io/itay-raveh/wanderbound
      SOURCEMAPS_IMAGE: ghcr.io/itay-raveh/wanderbound-sourcemaps
      DOCKER_BUILD_RECORD_UPLOAD: false
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true
          fetch-depth: 0

      - name: Validate stable release tag
        id: version
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi
          echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build paired release images
        uses: docker/bake-action@v7
        with:
          source: .
          files: docker-bake.hcl
          targets: default
          load: true
          vars: |
            APP_VERSION=${{ github.ref_name }}
            APP_IMAGE=${{ env.APP_IMAGE }}
            SOURCEMAPS_IMAGE=${{ env.SOURCEMAPS_IMAGE }}
            TAG=${{ steps.version.outputs.value }}
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

      - name: Verify paired release images
        run: python3 scripts/check_release_images.py
        env:
          APP_IMAGE: ${{ env.APP_IMAGE }}:${{ steps.version.outputs.value }}
          SOURCEMAPS_IMAGE: ${{ env.SOURCEMAPS_IMAGE }}:${{ steps.version.outputs.value }}

      - name: Push exact release tags
        run: |
          docker push "$SOURCEMAPS_IMAGE:${{ steps.version.outputs.value }}"
          docker push "$APP_IMAGE:${{ steps.version.outputs.value }}"

      - uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Create GitHub release
        run: |
          git cliff --current --strip header > /tmp/release-notes.md
          gh release create "$GITHUB_REF_NAME" --verify-tag \
            --notes-file /tmp/release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
