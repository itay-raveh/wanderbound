name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz | tar xz
          sudo mv gitleaks /usr/local/bin/
      - run: gitleaks git --no-banner --redact --verbose

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - uses: oven-sh/setup-bun@v2
      - run: uv sync --all-packages
      - run: bun install --frozen-lockfile
        working-directory: frontend
      - run: uv run ruff check app
        working-directory: backend
      - run: uv run ruff format app --check
        working-directory: backend
      - run: uv run ty check
        working-directory: backend
      - run: bun run lint
        working-directory: frontend
      - run: bunx vue-tsc -b tsconfig.app.json tsconfig.node.json
        working-directory: frontend
      - run: uv run vulture
        working-directory: backend
      - run: bun x knip
        working-directory: frontend

  test-backend:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg://ci:ci@localhost:5432/ci
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - run: uv run pytest
        working-directory: backend
      - name: Verify backend/openapi.json is up-to-date
        run: scripts/regen-openapi.sh

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        working-directory: frontend
      - run: bun run test
        working-directory: frontend

  test-e2e:
    runs-on: ubuntu-latest
    env:
      VITE_FRONTEND_URL: http://localhost
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        working-directory: frontend
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - run: bunx playwright install-deps chromium
        working-directory: frontend
      - if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install chromium
        working-directory: frontend
      - run: bun run test:e2e
        working-directory: frontend
      - if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/e2e/test-results/
          retention-days: 7

  test-migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg://ci:ci@localhost:5432/ci
      SECRET_KEY: ci
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - run: uv sync --all-packages
      - run: uv run alembic upgrade head
        working-directory: backend
      - run: uv run alembic downgrade base
        working-directory: backend
      - run: uv run alembic upgrade head
        working-directory: backend

  docker:
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci
      POSTGRES_USER: ci
      POSTGRES_DB: ci
      SECRET_KEY: ci
      DOMAIN: localhost
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        working-directory: frontend
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - run: bunx playwright install-deps chromium
        working-directory: frontend
      - if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install chromium
        working-directory: frontend
      - uses: docker/setup-buildx-action@v4
      - name: Build images with GHA layer cache
        uses: docker/bake-action@v7
        with:
          source: .
          files: compose.yml
          load: true
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
      - run: docker compose up -d --no-build
      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5173/api/v1/health; then
              echo " Backend healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become healthy"
          docker compose logs
          exit 1
      - run: bun run test:smoke
        working-directory: frontend
      - if: always()
        run: docker compose down
