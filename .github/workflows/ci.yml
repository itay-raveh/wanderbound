name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz | tar xz
          sudo mv gitleaks /usr/local/bin/
      - run: gitleaks git --no-banner --redact --verbose

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v7
      - uses: oven-sh/setup-bun@v2
      - run: uv sync --all-packages
      - run: bun install --frozen-lockfile
        working-directory: frontend
      - run: uv run ruff check app
        working-directory: backend
      - run: uv run ruff format app --check
        working-directory: backend
      - run: uv run ty check
        working-directory: backend
      - run: bun run lint
        working-directory: frontend
      - run: uv run vulture
        working-directory: backend
      - run: bun x knip
        working-directory: frontend

  test-backend:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci
      VITE_FRONTEND_URL: http://localhost
      VITE_GOOGLE_CLIENT_ID: ci
      POSTGRES_SERVER: localhost
      POSTGRES_USER: ci
      POSTGRES_PASSWORD: ci
      POSTGRES_DB: ci
      MAX_STORAGE_BYTES: "1000000"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v7
      - run: uv run pytest
        working-directory: backend

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        working-directory: frontend
      - run: bun run test
        working-directory: frontend

  test-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v7
      - uses: oven-sh/setup-bun@v2
      - run: uv sync --all-packages
      - run: bun install --frozen-lockfile
        working-directory: frontend
      - run: bunx playwright install --with-deps chromium
        working-directory: frontend
      - name: Generate OpenAPI spec
        run: uv run python ../scripts/generate_openapi.py > ../frontend/openapi.json
        working-directory: backend
      - run: bun run test:e2e
        working-directory: frontend
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/e2e/test-results/
          retention-days: 7

  test-migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_SERVER: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ci
      POSTGRES_PASSWORD: ci
      POSTGRES_DB: ci
      SECRET_KEY: ci
      VITE_FRONTEND_URL: http://localhost
      VITE_GOOGLE_CLIENT_ID: ci
      MAX_STORAGE_BYTES: "1000000"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --all-packages
      - run: uv run alembic upgrade head
        working-directory: backend
      - run: uv run alembic downgrade base
        working-directory: backend
      - run: uv run alembic upgrade head
        working-directory: backend

  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v7
      - uses: oven-sh/setup-bun@v2
      - uses: jdx/mise-action@v2
      - run: uv sync --all-packages
      - run: bun install --frozen-lockfile
        working-directory: frontend
      - run: bunx playwright install --with-deps chromium
        working-directory: frontend
      - run: mise run generate

  docker:
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci
      POSTGRES_USER: ci
      POSTGRES_DB: ci
      SECRET_KEY: ci
      VITE_FRONTEND_URL: http://localhost:5173
      VITE_GOOGLE_CLIENT_ID: ci
      MAX_STORAGE_BYTES: "1000000"
      DOMAIN: localhost
      VITE_MAPBOX_TOKEN: ci
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v7
      - uses: oven-sh/setup-bun@v2
      - run: uv sync --all-packages
      - run: bun install --frozen-lockfile
        working-directory: frontend
      - run: bunx playwright install --with-deps chromium
        working-directory: frontend
      - name: Generate assets
        run: |
          uv run scripts/generate_countries.py
          uv run scripts/generate_fonts.py
          uv run scripts/generate_topo.py
          bun scripts/generate-og-image.ts
      - run: docker compose build
      - run: docker compose up -d
      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5173/api/v1/health; then
              echo " Backend healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become healthy"
          docker compose logs
          exit 1
      - run: bun run test:smoke
        working-directory: frontend
      - if: always()
        run: docker compose down
