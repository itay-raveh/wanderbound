x-security: &security
  security_opt:
    - no-new-privileges:true
  cap_drop: [ALL]
  read_only: true

services:

  db:
    image: postgres:18
    restart: always
    <<: *security
    cap_add: [CHOWN, DAC_READ_SEARCH, FOWNER, SETGID, SETUID]
    shm_size: 128m
    tmpfs:
      - /tmp
      - /var/run/postgresql:uid=999,gid=999
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
          pids: 256
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - db-data:/var/lib/postgresql/data/pgdata
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Variable not set}
      POSTGRES_USER: ${POSTGRES_USER:?Variable not set}
      POSTGRES_DB: ${POSTGRES_DB:?Variable not set}

  object-storage:
    image: dxflrs/garage:v2.3.0@sha256:866bd13ed2038ba7e7190e840482bc27234c4afaf77be8cfa439ae088c1e4690
    restart: always
    <<: *security
    init: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
          pids: 256
    networks: [backend]
    command: [/garage, server, --single-node, --default-bucket]
    ports:
      - "127.0.0.1:3900:3900"
    environment:
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET:-}
      GARAGE_DEFAULT_ACCESS_KEY: ${UPLOAD_S3_ACCESS_KEY_ID:?Variable not set}
      GARAGE_DEFAULT_SECRET_KEY: ${UPLOAD_S3_SECRET_ACCESS_KEY:?Variable not set}
      GARAGE_DEFAULT_BUCKET: ${UPLOAD_S3_BUCKET:-wanderbound-uploads}
    healthcheck:
      test: [CMD, /garage, status]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
      - object-storage-metadata:/var/lib/garage/meta
      - object-storage-data:/var/lib/garage/data

  object-storage-init:
    image: amazon/aws-cli:2.36.1@sha256:406ca32d31e640a56e8d52921b40528cc64bfa59ec9cb4ee1456db6746cb7292
    restart: "no"
    <<: *security
    networks: [backend]
    entrypoint: [/bin/sh, /scripts/init_upload_bucket.sh]
    depends_on:
      object-storage:
        condition: service_healthy
    environment:
      AWS_ENDPOINT_URL: http://object-storage:3900
      AWS_DEFAULT_REGION: ${UPLOAD_S3_REGION:-garage}
      AWS_ACCESS_KEY_ID: ${UPLOAD_S3_ACCESS_KEY_ID:?Variable not set}
      AWS_SECRET_ACCESS_KEY: ${UPLOAD_S3_SECRET_ACCESS_KEY:?Variable not set}
      AWS_EC2_METADATA_DISABLED: "true"
      UPLOAD_S3_BUCKET: ${UPLOAD_S3_BUCKET:-wanderbound-uploads}
      UPLOAD_CORS_ORIGIN: ${PUBLIC_URL:-http://localhost:8000}
    tmpfs:
      - /tmp
    volumes:
      - ./scripts/init_upload_bucket.sh:/scripts/init_upload_bucket.sh:ro

  app:
    image: ghcr.io/itay-raveh/wanderbound:${WANDERBOUND_VERSION:-dev}
    restart: always
    <<: *security
    env_file: ${WANDERBOUND_ENV_FILE:-.env}
    init: true
    shm_size: 256m
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
          pids: 512
    networks: [backend, frontend]
    command:
      - sh
      - -c
      - >
        alembic upgrade head &&
        uv run uvicorn app.main:app --host 0.0.0.0 --port 8000
        --proxy-headers --log-config app/core/uvicorn_logging.json
    depends_on:
      db:
        condition: service_healthy
        restart: true
      object-storage-init:
        condition: service_completed_successfully
    environment:
      SENTRY_AUTH_TOKEN: ""
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - traefik.enable=true
      - traefik.http.routers.wanderbound.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.wanderbound.entrypoints=websecure
      - traefik.http.routers.wanderbound.tls.certresolver=letsencrypt
      - traefik.http.services.wanderbound.loadbalancer.server.port=8000
    volumes:
      - app-data:/app/backend/data

  sourcemaps:
    image: ghcr.io/itay-raveh/wanderbound-sourcemaps:${WANDERBOUND_VERSION:-dev}
    profiles: [sentry]
    restart: "no"
    <<: *security
    user: "65532:65532"
    environment:
      HOME: /tmp
      SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
      SENTRY_ORG: ${SENTRY_ORG:-}
      SENTRY_PROJECT: ${SENTRY_PROJECT:-}
      SENTRY_URL: ${SENTRY_URL:-https://sentry.io/}
      SENTRY_DISABLE_UPDATE_CHECK: "true"
    tmpfs:
      - /tmp

networks:
  backend:
    internal: true
  frontend:
    name: traefik
    external: true

volumes:
  db-data:
  app-data:
  object-storage-metadata:
  object-storage-data:
