x-security: &security
  security_opt:
    - no-new-privileges:true
  cap_drop: [ALL]
  read_only: true

services:

  db:
    image: postgres:18
    restart: always
    <<: *security
    cap_add: [CHOWN, DAC_READ_SEARCH, FOWNER, SETGID, SETUID]
    shm_size: 128m
    tmpfs:
      - /tmp
      - /var/run/postgresql:uid=999,gid=999
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
          pids: 256
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - db-data:/var/lib/postgresql/data/pgdata
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Variable not set}
      POSTGRES_USER: ${POSTGRES_USER:?Variable not set}
      POSTGRES_DB: ${POSTGRES_DB:?Variable not set}

  backend:
    image: 'backend:${TAG:-latest}'
    restart: always
    <<: *security
    init: true
    shm_size: 256m
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
          pids: 512
    networks: [backend, frontend]
    command: sh -c "alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers"
    depends_on:
      db:
        condition: service_healthy
        restart: true
    environment:
      POSTGRES_SERVER: db
      POSTGRES_USER: ${POSTGRES_USER:?Variable not set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Variable not set}
      POSTGRES_DB: ${POSTGRES_DB:?Variable not set}
      SECRET_KEY: ${SECRET_KEY:?Variable not set}
      VITE_FRONTEND_URL: ${VITE_FRONTEND_URL:-}
      VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
      VITE_MICROSOFT_CLIENT_ID: ${VITE_MICROSOFT_CLIENT_ID:-}
      MAX_STORAGE_BYTES: ${MAX_STORAGE_BYTES:-}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-}
      VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN:-}
      ENVIRONMENT: ${ENVIRONMENT:-local}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - traefik.enable=true
      - traefik.http.routers.wanderbound-be.rule=Host(`api.${DOMAIN}`)
      - traefik.http.routers.wanderbound-be.entrypoints=websecure
      - traefik.http.routers.wanderbound-be.tls.certresolver=letsencrypt
      - traefik.http.services.wanderbound-be.loadbalancer.server.port=8000
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      - app-data:/app/backend/data

  db-backup:
    image: prodrigestivill/postgres-backup-local
    restart: always
    <<: *security
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
          pids: 64
    networks: [backend]
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:?Variable not set}
      POSTGRES_USER: ${POSTGRES_USER:?Variable not set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Variable not set}
      SCHEDULE: ${BACKUP_DB_SCHEDULE:-0 3 * * *}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-7}
      BACKUP_KEEP_WEEKS: ${BACKUP_KEEP_WEEKS:-4}
      BACKUP_KEEP_MONTHS: ${BACKUP_KEEP_MONTHS:-6}
    volumes:
      - backup-data:/backups

  data-backup:
    image: offen/docker-volume-backup:v2
    restart: always
    <<: *security
    network_mode: none
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
          pids: 64
    environment:
      BACKUP_CRON_EXPRESSION: ${BACKUP_DATA_SCHEDULE:-0 4 * * *}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_FILENAME: data-%Y-%m-%dT%H-%M-%S.tar.gz
    volumes:
      - app-data:/backup/app-data:ro
      - backup-data:/archive

  frontend:
    image: 'frontend:${TAG:-latest}'
    restart: always
    <<: *security
    tmpfs:
      - /etc/nginx/conf.d:uid=101,gid=101
      - /var/cache/nginx:uid=101,gid=101
      - /var/run:uid=101,gid=101
      - /tmp
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
          pids: 128
    networks: [frontend]
    labels:
      - traefik.enable=true
      - traefik.http.routers.wanderbound-fe.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.wanderbound-fe.entrypoints=websecure
      - traefik.http.routers.wanderbound-fe.tls.certresolver=letsencrypt
      - traefik.http.services.wanderbound-fe.loadbalancer.server.port=8080
    build:
      context: .
      dockerfile: frontend/Dockerfile
      additional_contexts:
        - openapi=service:backend
      args:
        - VITE_MAX_UPLOAD_GB=${VITE_MAX_UPLOAD_GB:-4}
        - VITE_MAPBOX_TOKEN=${VITE_MAPBOX_TOKEN:-}
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID:-}
        - VITE_CONTACT_EMAIL=${VITE_CONTACT_EMAIL:-}
        - VITE_GITHUB_URL=${VITE_GITHUB_URL:-}
        - VITE_AUTHOR_NAME=${VITE_AUTHOR_NAME:-}
        - VITE_AUTHOR_URL=${VITE_AUTHOR_URL:-}
        - VITE_SENTRY_DSN=${VITE_SENTRY_DSN:-}
        - VITE_FRONTEND_URL=${VITE_FRONTEND_URL:-http://localhost}

networks:
  backend:
    internal: true
  frontend:
    name: traefik
    external: true

volumes:
  db-data:
  app-data:
  backup-data:
