services:

  db:
    image: postgres:18
    restart: always
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    cap_add: [CHOWN, FOWNER, SETGID, SETUID]
    read_only: true
    shm_size: 128m
    tmpfs:
      - /tmp
      - /var/run/postgresql
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
          pids: 256
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - db-data:/var/lib/postgresql/data/pgdata
    env_file:
      - .env
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_DB=${POSTGRES_DB?Variable not set}

  prestart:
    image: 'backend:${TAG:-latest}'
    build:
      context: .
      dockerfile: backend/Dockerfile
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
          pids: 64
    depends_on:
      db:
        condition: service_healthy
        restart: true
    command: bash scripts/prestart.sh
    env_file:
      - .env
    environment:
      - POSTGRES_SERVER=db
    volumes:
      - app-data:/app/backend/data

  backend:
    image: 'backend:${TAG:-latest}'
    restart: always
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    read_only: true
    init: true
    shm_size: 256m
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
          pids: 512
    depends_on:
      db:
        condition: service_healthy
        restart: true
      prestart:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - POSTGRES_SERVER=db
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')" ]
      interval: 10s
      timeout: 5s
      retries: 5
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      - app-data:/app/backend/data

  frontend:
    image: 'frontend:${TAG:-latest}'
    restart: always
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    read_only: true
    tmpfs:
      - /var/cache/nginx:uid=101,gid=101
      - /var/run:uid=101,gid=101
      - /tmp
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
          pids: 128
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_MAX_UPLOAD_GB=${VITE_MAX_UPLOAD_GB:-4}
        - VITE_BACKEND_URL=https://api.${DOMAIN?Variable not set}
        - VITE_MAPBOX_TOKEN=${VITE_MAPBOX_TOKEN}
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}

volumes:
  db-data:
  app-data:
