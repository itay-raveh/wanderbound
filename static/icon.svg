<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Defs for gradients -->
  <defs>
    <linearGradient id="polarGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FA504D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E02E2B;stop-opacity:1" />
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15"/>
      <feOffset dx="5" dy="10" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge> 
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/> 
      </feMerge>
    </filter>
  </defs>

  <!-- Background Shape: Rounded Rect (Album/Book) -->
  <rect x="64" y="64" width="384" height="384" rx="60" fill="url(#polarGradient)" filter="url(#dropShadow)" />
  
  <!-- Book Spine Detail (Left side) -->
  <path d="M100 64 H 130 V 448 H 100 A 36 36 0 0 1 64 412 V 100 A 36 36 0 0 1 100 64 Z" fill="rgba(0,0,0,0.15)" />

  <!-- Center Icon: Location Pin + Photo Frame merged -->
  <g transform="translate(256, 256) scale(0.7)">
    <!-- Photo Frame (White) -->
    <rect x="-140" y="-120" width="280" height="200" rx="10" fill="white" />
    
    <!-- Photo Content (Darker Rect) -->
    <rect x="-120" y="-100" width="240" height="160" rx="4" fill="#1a1a2e" />

    <!-- Location Pin Shape (Overlaying) -->
    <path d="M0 -30 C-50 -30 -90 10 -90 60 C-90 120 0 190 0 190 C0 190 90 120 90 60 C90 10 50 -30 0 -30 Z" fill="#FA504D" stroke="white" stroke-width="8" transform="translate(0, -20)"/>
    
    <!-- Pin Center Hole -->
    <circle cx="0" cy="40" r="25" fill="white" transform="translate(0, -20)"/>
  </g>
</svg>
