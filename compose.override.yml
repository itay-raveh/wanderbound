services:

  db:
    restart: "no"
    ports:
      - "127.0.0.1:5432:5432"

  backend:
    restart: "no"
    ports:
      - "127.0.0.1:8000:8000"
    command: sh -c "alembic upgrade head && uvicorn app.main:app --reload --host 0.0.0.0 --proxy-headers"
    develop:
      watch:
        - path: ./backend
          action: sync
          target: /app/backend
          ignore:
            - ./backend/.venv
            - .venv
        - path: ./backend/pyproject.toml
          action: rebuild

  frontend:
    restart: "no"
    networks: [backend, frontend]
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:5173:8080"
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_BACKEND_URL=http://localhost:8000

networks:
  backend:
    internal: false
  frontend:
    external: false
