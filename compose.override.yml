services:

  db:
    restart: "no"
    ports:
      - "127.0.0.1:5432:5432"

  app:
    image: wanderbound:${APP_VERSION:-dev}
    pull_policy: build
    restart: "no"
    read_only: false
    ports:
      - "127.0.0.1:8000:8000"
    command: [start-wanderbound, --reload]
    environment:
      - PUBLIC_URL
    build:
      context: .
      dockerfile: Dockerfile
      target: ${WANDERBOUND_BUILD_TARGET:-runtime}
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    develop:
      watch:
        - path: ./backend
          action: sync
          target: /app/backend
          ignore:
            - ./backend/.venv
            - .venv
        - path: ./backend/pyproject.toml
          action: rebuild

  sourcemaps:
    image: wanderbound:${APP_VERSION:-dev}

networks:
  backend:
    internal: false
  frontend:
    external: false
    name: ${COMPOSE_PROJECT_NAME:-wanderbound}_frontend
