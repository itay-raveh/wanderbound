[project]
name = "polarsteps-album-generator"
version = "0.1.0"
description = "Generate photo albums from Polarsteps trip data"
readme = "README.md"
requires-python = ">=3.11"
license = { file = "LICENSE" }
authors = [{ name = "Itay Raveh", email = "itay.raveh@proton.me" }]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: End Users/Desktop",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
]
keywords = [
    "polarsteps",
    "photo-album",
    "travel",
    "html-generator",
    "pdf-generator",
]
dependencies = [
    "httpx>=0.25.0",
    "Pillow>=10.0.0",
    "pytz>=2024.1",
    "pydantic>=2.12.5",
    "pydantic-settings>=2.12.0",
    "jinja2>=3.1.0",
    "playwright>=1.40.0",
    "colormath>=3.0.0",
    "lxml>=5.0.0",
    "geopy>=2.4.0",
    "geopandas>=0.14.0",
    "shapely>=2.0.0",
    "more-itertools>=10.0.0",
    "langdetect>=1.0.9",
    "rich>=13.0.0",
    "tenacity>=8.2.0",
    "python-dateutil>=2.8.0",
    "diskcache>=5.6.0",
    "pyproj>=3.7.2",
    "typed-argument-parser>=1.8.0",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.14.7",
    "mypy>=1.19.0",
    "vulture>=2.10",
    "deptry>=0.24.0",
    "djlint>=1.36.4",
    "taskipy>=1.14.0",
    "pre-commit>=4.5.0",
]

[project.scripts]
polarsteps-album = "src.cli.main:main"

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"


[tool.setuptools]
packages = ["src"]

[tool.taskipy.tasks]
format = "ruff format ."
check = "ruff check . --fix --unsafe-fixes"
types = "mypy ."
deps = "deptry ."
dead = "vulture src"
html = "djlint **/*.jinja --lint --reformat "
lint = "task format && task check && task types && task deps && task dead && task html"

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["ALL"]

ignore = [
    "D203", # 1-blank-line-before-class (conflicts with D211)
    "D213", # Multi-line docstring summary at second line (conflicts with D212)
    "COM812", # Missing trailing comma (conflicts with formatter)
    "ISC001", # Single line implicit string concatenation (conflicts with formatter)
    "FIX002", # Fails if "TODO" is present (blocks development too hard)
    "TD003", # Missing issue link for TODO (too bureaucratic)
    "EM101", # Exception must not use a string literal
    "EM102", # Exception must not use an f-string literal
    "PLR2004", # Magic numbers - many are acceptable (HTTP codes, common values)
    "TRY003", # Long exception messages - acceptable for user-facing errors
    "ANN401", # Any types - acceptable for generic cache functions
    "S324", # MD5 hash - acceptable for non-cryptographic use (color selection)
    "D100", # Missing docstring in public module
    "D101", # Missing docstring in public class
    "D102", # Missing docstring in public method
    "D103", # Missing docstring in public function
    "D104", # Missing docstring in public package
    "D105", # Missing docstring in magic method
    "D106", # Missing docstring in public nested class
    "D107", # Missing docstring in __init__
]

[tool.ruff.lint.isort]
combine-as-imports = true

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.mccabe]
max-complexity = 10 # Flag functions that are too nested/complex


[tool.mypy]
strict = true
ignore_missing_imports = false
warn_unused_ignores = true
show_error_codes = true
warn_unreachable = true
pretty = true


[[tool.mypy.overrides]]
module = [
    "geopy.*",
    "colormath.*",
    "langdetect.*",
    "diskcache.*",
    "geopandas.*",
    "lxml.*",
    "shapely.*",
    "pytz.*",
    "dateutil.*",
]
ignore_missing_imports = true

[tool.vulture]
min_confidence = 80
sort_by_size = true


[tool.deptry]
# Ignore dev dependencies that are imported in tests but not main code
ignore_notebooks = true

[tool.deptry.per_rule_ignores]
# DEP002 = "Unused dependency"
# We ignore these because they are CLI tools, not libraries we import.
DEP002 = [
    "pre-commit",
    "taskipy",
    "playwright",
    "ruff",
    "mypy",
    "pylint",
    "vulture",
    "deptry",
    "djlint",
]


[tool.djlint]
profile = "jinja"
# H006: img tags missing height/width (often impossible in dynamic templates)
# H031: meta keywords missing (outdated SEO rule)
ignore = "H006,H031"

[tool.djlint.js]
# Formats JS inside <script> tags
indent_size = 2

[tool.djlint.css]
# Formats CSS inside <style> tags
indent_size = 4
