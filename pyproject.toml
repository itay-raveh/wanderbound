[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "polarsteps-album-generator"
version = "0.1.0"
description = "Generate beautiful HTML photo albums from Polarsteps trip data"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Itay Raveh", email = "itay.raveh@proton.me" }]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: End Users/Desktop",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
keywords = [
    "polarsteps",
    "photo-album",
    "travel",
    "html-generator",
    "pdf-generator",
]
dependencies = [
    "httpx>=0.25.0",
    "Pillow>=10.0.0",
    "pytz>=2024.1",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "jinja2>=3.1.0",
    "playwright>=1.40.0",
    "diskcache>=5.6.0",
    "colormath>=3.0.0",
    "lxml>=5.0.0",
    "geopy>=2.4.0",
    "geopandas>=0.14.0",
    "shapely>=2.0.0",
    "more-itertools>=10.0.0",
    "langdetect>=1.0.9",
    "rich>=13.0.0",
    "tenacity>=8.2.0",
    "ratelimit>=2.2.1",
    "python-dateutil>=2.8.0",
]

[project.optional-dependencies]
dev = [
    "black>=23.0.0",
    "isort>=5.12.0",
    "ruff>=0.1.0",
    "mypy>=1.0.0",
    "pylint>=3.0.0",
    "vulture>=2.10",
]

[project.scripts]
polarsteps-album = "src.main:main"

[tool.setuptools]
packages = ["src"]

[tool.black]
line-length = 100
target-version = ["py310", "py311", "py312", "py313"]

[tool.isort]
profile = "black"
line_length = 100

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "src.apis.helpers"
warn_return_any = false
