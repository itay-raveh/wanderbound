min_version = "2026.4.8"

[settings]
# Hash source contents instead of mtime, for fresh clones and CI
task.source_freshness_hash_contents = true

[tools]
python = "3.14"
bun = "1"
uv = "0.10"
"github:orhun/git-cliff" = "2"
# prek is still 0.x; pin minor so patches flow without breakage.
prek = "0.3"

# -- Setup --------------------------------------------------------

[tasks.setup]
description = "Bootstrap dev environment from fresh clone"
run = [
    "cp -n .env.example .env || true",
    "uv sync",
    "bun install",
    "prek install --prepare-hooks",
    "prek install --hook-type commit-msg",
    "mise run generate",
    "mise run db:migrate",
]

# -- Dev servers --------------------------------------------------

[tasks."dev:backend"]
description = "Start backend dev server"
dir = "backend"
run = "uv run fastapi dev"
depends = ["db:migrate"]

[tasks."dev:frontend"]
description = "Start frontend dev server"
dir = "frontend"
run = "bun run dev"

# -- Testing ------------------------------------------------------

[tasks."test:backend"]
description = "Run backend tests"
dir = "backend"
run = "uv run pytest"

[tasks."test:frontend"]
description = "Run frontend unit tests"
dir = "frontend"
run = "bun run test"

[tasks."test:e2e"]
description = "Run frontend E2E tests"
dir = "frontend"
run = "bun run test:e2e"

[tasks."test:smoke"]
description = "Smoke tests against running Docker stack"
dir = "frontend"
run = "bun run test:smoke"

[tasks.test]
description = "Run all tests"
depends = ["test:backend", "test:frontend", "test:e2e"]

# -- Linting ------------------------------------------------------

[tasks."lint:backend"]
description = "Lint backend (ruff + ty)"
dir = "backend"
run = [
    "uv run ty check",
    "uv run ruff check app",
    "uv run ruff format app --check",
]

[tasks."lint:frontend"]
description = "Lint frontend (eslint)"
dir = "frontend"
run = "bun run lint"

[tasks.lint]
description = "Run all linters"
depends = ["lint:*", "deadcode:*"]

# -- Dead code ----------------------------------------------------

[tasks."deadcode:backend"]
description = "Find dead Python code (vulture)"
dir = "backend"
run = "uv run vulture"

[tasks."deadcode:frontend"]
description = "Find dead JS/TS code (knip)"
dir = "frontend"
run = "bun x knip"

# -- Formatting ---------------------------------------------------

[tasks."format:backend"]
description = "Format backend code"
dir = "backend"
run = ["uv run ruff check app --fix", "uv run ruff format app"]

[tasks."format:frontend"]
description = "Format frontend code"
dir = "frontend"
run = "bun run format"

[tasks.format]
description = "Format all code"
depends = ["format:*"]

# -- Docker -------------------------------------------------------

[tasks.up]
description = "Start Docker services"
run = "docker compose up"

[tasks.down]
description = "Stop Docker services and clean up"
run = "docker compose down --remove-orphans"

[tasks.logs]
description = "Tail Docker Compose logs"
run = "docker compose logs -f"
raw = true

# -- Database -----------------------------------------------------

[tasks."db:migrate"]
description = "Run database migrations (alembic upgrade head)"
dir = "backend"
run = "uv run alembic upgrade head"

[tasks."db:migration"]
description = "Create a new alembic migration"
dir = "backend"
usage = '''
arg "<name>" help="Migration message (quote if multi-word)"
'''
run = 'uv run alembic revision --autogenerate -m "$usage_name"'

[tasks."db:shell"]
description = "Open interactive psql session"
run = "docker compose exec db psql -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-app}"
raw = true

[tasks."db:reset"]
description = "Drop and recreate database, then run migrations"
confirm = "This will permanently drop all data in the database. Continue?"
run = [
    "docker compose exec db dropdb -U ${POSTGRES_USER:-postgres} --if-exists ${POSTGRES_DB:-app}",
    "docker compose exec db createdb -U ${POSTGRES_USER:-postgres} ${POSTGRES_DB:-app}",
    "mise run db:migrate",
]

[tasks."db:restore"]
description = "Restore database or data from backups (list|db|data)"
run = "bash scripts/restore.sh"
raw = true

# -- Generated -----------------------------------------------------

[tasks."generate:countries"]
description = "Regenerate country SVGs and bounds.json from Natural Earth data"
sources = ["scripts/generate_countries.py"]
outputs = [
    "frontend/public/countries/*.svg",
    "frontend/src/countries/bounds.json",
]
run = "uv run scripts/generate_countries.py"

[tasks."generate:fonts"]
description = "Download Google Fonts and generate @font-face CSS from fonts.json"
sources = ["scripts/generate_fonts.py", "frontend/fonts.json"]
outputs = [
    "frontend/public/fonts/**/*",
    "frontend/src/styles/fonts.css",
]
run = "uv run scripts/generate_fonts.py"

[tasks."generate:topo"]
description = "Generate topographic contour SVG"
sources = ["scripts/generate_topo.py"]
outputs = ["frontend/public/topo-contours.svg"]
run = "uv run scripts/generate_topo.py"

[tasks."generate:og-image"]
description = "Generate OG social preview image"
depends = ["generate:fonts", "generate:topo"]
sources = [
    "scripts/generate-og-image.ts",
    "frontend/public/logo.svg",
    "frontend/public/topo-contours.svg",
    "frontend/public/fonts/**",
]
outputs = ["frontend/public/og-image.png"]
run = "bun scripts/generate-og-image.ts"

[tasks."generate:openapi"]
description = "Export OpenAPI spec to backend/openapi.json"
dir = "backend"
sources = ["app/**/*.py", "../scripts/generate_openapi.py"]
outputs = ["openapi.json"]
run = "uv run python ../scripts/generate_openapi.py"

[tasks."generate:landing"]
description = "Screenshot landing page images (requires running dev:backend + dev:frontend + migrated DB)"
run = "bun scripts/generate-landing.ts"

[tasks.generate]
description = "Regenerate all derived assets (except landing - needs live servers)"
depends = [
    "generate:countries",
    "generate:fonts",
    "generate:topo",
    "generate:og-image",
    "generate:openapi",
]

# -- Changelog ----------------------------------------------------

[tasks."changelog:next"]
description = "Preview release notes for unreleased commits"
run = "git cliff --unreleased --strip header"
