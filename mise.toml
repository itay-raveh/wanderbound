[tools]
python = "3.14"
bun = "1"
uv = "latest"

# -- Setup --------------------------------------------------------

[tasks.setup]
description = "Bootstrap dev environment from fresh clone"
run = [
    "cp -n .env.example .env || true",
    "uv sync",
    "bun install",
    "mise run generate",
    "mise run db:migrate",
]

[tasks.doctor]
description = "Check that all required tools and services are available"
run = """
set -euo pipefail
err=0
for cmd in docker uv bun mise; do
  if command -v "$cmd" &>/dev/null; then
    printf 'OK  %-10s %s\\n' "$cmd" "$(command -v "$cmd")"
  else
    printf 'MISSING  %s\\n' "$cmd"; err=1
  fi
done
docker info &>/dev/null && echo "OK  docker daemon" || { echo "MISSING  docker daemon"; err=1; }
exit $err
"""

# -- Dev servers --------------------------------------------------

[tasks."dev:backend"]
description = "Start backend dev server"
dir = "backend"
run = "uv run fastapi dev"

[tasks."dev:frontend"]
description = "Start frontend dev server"
dir = "frontend"
run = "bun run dev"

# -- Testing ------------------------------------------------------

[tasks."test:backend"]
description = "Run backend tests"
dir = "backend"
run = "uv run pytest"

[tasks."test:frontend"]
description = "Run frontend unit tests"
dir = "frontend"
run = "bun run test"

[tasks."test:e2e"]
description = "Run frontend E2E tests"
dir = "frontend"
run = "bun run test:e2e"

[tasks."test:smoke"]
description = "Smoke tests against running Docker stack"
dir = "frontend"
run = "bun run test:smoke"

[tasks.test]
description = "Run all tests"
depends = ["test:backend", "test:frontend", "test:e2e"]

# -- Linting ------------------------------------------------------

[tasks."lint:backend"]
description = "Lint backend (ruff + ty)"
dir = "backend"
run = [
    "uv run ty check",
    "uv run ruff check app",
    "uv run ruff format app --check",
]

[tasks."lint:frontend"]
description = "Lint frontend (eslint)"
dir = "frontend"
run = "bun run lint"

[tasks.lint]
description = "Run all linters"
depends = ["lint:*", "deadcode:*"]

# -- Dead code ----------------------------------------------------

[tasks."deadcode:backend"]
description = "Find dead Python code (vulture)"
dir = "backend"
run = "uv run vulture"

[tasks."deadcode:frontend"]
description = "Find dead JS/TS code (knip)"
dir = "frontend"
run = "bun x knip"

[tasks.deadcode]
description = "Find all dead code"
depends = ["deadcode:*"]

# -- Formatting ---------------------------------------------------

[tasks."format:backend"]
description = "Format backend code"
dir = "backend"
run = ["uv run ruff check app --fix", "uv run ruff format app"]

[tasks."format:frontend"]
description = "Format frontend code"
dir = "frontend"
run = "bun run format"

[tasks.format]
description = "Format all code"
depends = ["format:*"]

# -- Fix ----------------------------------------------------------

[tasks.fix]
description = "Auto-fix all fixable format issues"
depends = ["format"]

# -- Build --------------------------------------------------------

[tasks.build]
description = "Build frontend for production"
dir = "frontend"
run = "bun run build"

# -- Docker -------------------------------------------------------

[tasks.up]
description = "Start all Docker services"
run = "docker compose up"

[tasks.down]
description = "Stop all Docker services and clean up"
run = "docker compose down --remove-orphans"

[tasks.logs]
description = "Tail Docker Compose logs"
run = "docker compose logs -f"
raw = true

# -- Database -----------------------------------------------------

[tasks."db:migrate"]
description = "Run database migrations (alembic upgrade head)"
dir = "backend"
run = "uv run alembic upgrade head"

[tasks."db:migration"]
description = "Create a new alembic migration (pass name as argument)"
dir = "backend"
run = "uv run alembic revision --autogenerate -m \"$*\""

[tasks."db:shell"]
description = "Open interactive psql session"
run = "docker compose exec db psql -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-app}"
raw = true

[tasks."db:reset"]
description = "Drop and recreate database, then run migrations"
run = [
    "docker compose exec db dropdb -U ${POSTGRES_USER:-postgres} --if-exists ${POSTGRES_DB:-app}",
    "docker compose exec db createdb -U ${POSTGRES_USER:-postgres} ${POSTGRES_DB:-app}",
    "mise run db:migrate",
]

[tasks."db:restore"]
description = "Restore database or data from backups (list|db|data)"
run = "bash scripts/restore.sh"
raw = true

# -- Generated -----------------------------------------------------

[tasks."generate:countries"]
description = "Regenerate country SVGs and bounds.json from Natural Earth data"
run = "uv run scripts/generate_countries.py"

[tasks."generate:fonts"]
description = "Download Google Fonts and generate @font-face CSS from fonts.json"
run = "uv run scripts/generate_fonts.py"

[tasks."generate:topo"]
description = "Generate topographic contour SVG"
run = "uv run scripts/generate_topo.py"

[tasks."generate:og-image"]
description = "Generate OG social preview image"
depends = ["generate:fonts"]
run = "bun scripts/generate-og-image.ts"

[tasks."generate:openapi"]
description = "Export OpenAPI spec to stdout"
dir = "backend"
run = "uv run python ../scripts/generate_openapi.py"

[tasks."generate:landing"]
description = "Screenshot landing page images (requires running dev:backend + dev:frontend + migrated DB)"
run = "bun scripts/generate-landing.ts"

[tasks.generate]
description = "Regenerate all derived assets (except landing - needs live servers)"
depends = [
    "generate:countries",
    "generate:fonts",
    "generate:topo",
    "generate:og-image",
]

# -- CI -----------------------------------------------------------

[tasks.ci]
description = "Run the full CI pipeline locally"
depends = ["lint", "test", "build"]

# -- Clean --------------------------------------------------------

[tasks.clean]
description = "Remove caches and build artifacts"
run = [
    "rm -rf .pytest_cache .ruff_cache",
    "find . -type d -name __pycache__ -not -path './.venv/*' -not -path './node_modules/*' -exec rm -rf {} + 2>/dev/null || true",
    "rm -rf frontend/dist",
]

[tasks.nuke]
description = "Full reset to fresh-clone state (keeps .env)"
depends = ["down", "clean"]
run = "rm -rf node_modules frontend/node_modules .venv"
