[project]
name = "psagen"
version = "0.1.0"
description = "Generate photo albums from Polarsteps trip data"
requires-python = ">=3.14"
authors = [{ name = "Itay Raveh", email = "itay.raveh@proton.me" }]

dependencies = [
    "Pillow",
    "pydantic>2",
    "pydantic-settings>2",
    "rich",
    "tenacity",
    "fastapi",
    "python-multipart",
    "uvicorn",
    "sqlalchemy>2",
    "sqlmodel",
    "aiosqlite",
    "safezip",
    "numpy>2",
    "httpx",
]

[dependency-groups]
dev = [
    "ruff",
    "basedpyright",
    "deptry",
    "taskipy",
]

[build-system]
requires = ["uv_build>=0.9,<0.10.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "app"
module-root = "src"

[tool.taskipy.tasks]
format = "ruff format ."
check = "ruff check . --fix --unsafe-fixes"
types = "basedpyright"
deps = "deptry ."
lint = "task format && task check && task types && task deps"

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["ALL"]

ignore = [
    "D203",
    "D213",
    "COM812",
    "ISC001",
    "EM101",
    "EM102",
    "PLR2004",
    "TRY003",
    "D100",
    "D101",
    "D102",
    "D103",
    "D104",
    "D105",
    "D106",
    "D107",
    "D401",
    "E741",
]

[tool.ruff.lint.isort]
combine-as-imports = true

[tool.ruff.lint.mccabe]
max-complexity = 8

[tool.pyright]
reportUnusedCallResult = false
reportPrivateUsage = false
reportImplicitOverride = false
reportUnannotatedClassAttribute = false

[tool.deptry.per_rule_ignores]
# DEP002 = "Unused dependency"
# We ignore these because they are CLI tools, not libraries we import.
DEP002 = [
    "pre-commit",
    "taskipy",
    "playwright",
    "ruff",
    "mypy",
    "deptry",
    "djlint",
]
# DEP003 = "Transitive dependency"
DEP003 = ["psagen"]

[tool.djlint]
profile = "jinja"
# H006: img tags missing height/width (often impossible in dynamic templates)
# H031: meta keywords missing (outdated SEO rule)
ignore = "H006,H031"
