[project]
name = "psagen"
version = "0.1.0"
requires-python = ">=3.14"
authors = [{ name = "Itay Raveh", email = "itay.raveh@proton.me" }]

dependencies = [
    "Pillow",
    "pydantic>2",
    "pydantic-settings>2",
    "rich",
    "fastapi",
    "python-multipart",
    "uvicorn",
    "sqlalchemy>2",
    "sqlmodel",
    "aiosqlite",
    "safezip",
    "numpy>2",
    "httpx",
    "hishel[httpx]",
    "httpx-retries",
    "rasterio>=1.5",
    "polars>=1.38.1",
]

[dependency-groups]
dev = ["ruff", "basedpyright", "deptry", "taskipy", "pytest>=9.0.2"]

[build-system]
requires = ["uv_build>=0.9,<0.10.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "app"
module-root = "src"

[tool.taskipy.tasks]
format = "ruff format ."
check = "ruff check . --fix --unsafe-fixes"
types = "basedpyright"
deps = "deptry ."
lint = "task format && task check && task types && task deps"

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["ALL"]

ignore = [
    "D203",
    "D213",
    "COM812",
    "ISC001",
    "EM101",
    "EM102",
    "PLR2004",
    "TRY003",
    "D100",
    "D101",
    "D102",
    "D103",
    "D104",
    "D105",
    "D106",
    "D107",
    "D401",
    "E741",
    "D413",
]

[tool.ruff.lint.isort]
combine-as-imports = true

[tool.ruff.lint.mccabe]
max-complexity = 8

[tool.pyright]
reportUnusedCallResult = false
reportPrivateUsage = false
reportImplicitOverride = false
reportUnannotatedClassAttribute = false

[tool.deptry.per_rule_ignores]
# DEP002 = "Unused dependency"
DEP002 = [
    "taskipy",
    "ruff",
    "deptry",
    "uvicorn",
    "python-multipart",
    "aiosqlite",
]
# DEP003 = "Transitive dependency"
DEP003 = ["app"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
