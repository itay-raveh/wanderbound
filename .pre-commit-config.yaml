repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-toml
      - id: check-yaml
        args:
          - --unsafe
      - id: end-of-file-fixer
        exclude: |
          (?x)^(
              frontend/src/client/.*|
          )$
      - id: trailing-whitespace
        exclude: ^frontend/src/client/.*
  - repo: local
    hooks:
      - id: local-eslint
        name: eslint
        entry: bash -c 'cd frontend && eval "$(mise activate bash)" && bun run lint'
        language: system
        files: ^frontend/.*\.(ts|tsx|vue|js|jsx)$
        pass_filenames: false

      - id: local-ruff-check
        name: ruff check
        entry: uv run ruff check --force-exclude --fix --exit-non-zero-on-fix
        require_serial: true
        language: system
        types: [ python ]

      - id: local-ruff-format
        name: ruff format
        entry: uv run ruff format --force-exclude --exit-non-zero-on-format
        require_serial: true
        language: system
        types: [ python ]

      - id: local-ty
        name: ty check
        entry: bash -c 'cd backend && uv run ty check'
        require_serial: true
        language: system
        pass_filenames: false
