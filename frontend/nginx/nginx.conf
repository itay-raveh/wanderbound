# http-level directives (this file is included inside http {} by the nginx image)
limit_req_zone $binary_remote_addr zone=general:1m rate=10r/s;
limit_req_zone $binary_remote_addr zone=uploads:1m rate=1r/m;
server_tokens off;

upstream backend {
  server backend:8000;
  keepalive 16;
}

server {
  listen 80;
  root /usr/share/nginx/html;
  client_max_body_size 4g;  # keep in sync with VITE_MAX_UPLOAD_GB
  client_body_timeout 300s;
  limit_req_status 429;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types text/plain text/css text/javascript application/javascript
             application/json application/xml image/svg+xml;

  # Merge with location-level add_header instead of replacing (nginx 1.29.3+)
  add_header_inherit merge;
  include /etc/nginx/security-headers.conf;

  # Upload endpoint — strictest limit
  location = /api/v1/users/upload {
    limit_req zone=uploads burst=2 nodelay;
    include /etc/nginx/proxy-params.conf;
  }

  # General API — moderate limit
  location /api/ {
    limit_req zone=general burst=30 nodelay;
    include /etc/nginx/proxy-params.conf;
  }

  # Vite-hashed assets — immutable, cache forever
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location / {
    index index.html index.htm;
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }
}
