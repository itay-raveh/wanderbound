# http-level directives (this file is included inside http {} by the nginx image)
limit_req_zone $binary_remote_addr zone=general:1m rate=10r/s;
map $request_method $media_read_limit_key {
  default "";
  GET $binary_remote_addr;
  HEAD $binary_remote_addr;
}
limit_req_zone $media_read_limit_key zone=media_reads:1m rate=60r/s;
limit_req_zone $binary_remote_addr zone=demo:1m rate=2r/m;
server_tokens off;

upstream backend {
  server ${BACKEND_HOST}:${BACKEND_PORT};
  keepalive 16;
}

server {
  listen 8080;
  root /usr/share/nginx/html;
  client_max_body_size ${MAX_UPLOAD_SIZE}g;
  client_body_timeout 300s;
  limit_req_status 429;

  error_page 429 /429.json;
  location = /429.json {
    internal;
    default_type application/json;
    return 429 '{"detail": "Too many requests"}';
  }

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types text/plain text/css text/javascript application/javascript
             application/json application/xml image/svg+xml;

  # Merge with location-level add_header instead of replacing (nginx 1.29.3+)
  add_header_inherit merge;
  set $csp_default  "default-src 'self'";
  set $csp_script   "script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://accounts.google.com/gsi/client https://api.mapbox.com/mapbox-gl-js/plugins/ https://static.cloudflareinsights.com";
  set $csp_style    "style-src 'self' 'unsafe-inline' https://accounts.google.com";
  set $csp_img      "img-src 'self' data: blob: https://api.mapbox.com https://*.tiles.mapbox.com https://lh3.googleusercontent.com";
  set $csp_font     "font-src 'self'";
  set $csp_connect  "connect-src 'self' ${UPLOAD_S3_BROWSER_ORIGIN} https://api.mapbox.com https://events.mapbox.com https://accounts.google.com/gsi/ https://login.microsoftonline.com https://o4511082013589504.ingest.de.sentry.io https://cloudflareinsights.com";
  set $csp_frame    "frame-src https://accounts.google.com/gsi/";
  set $csp_worker   "worker-src 'self' blob:";
  set $csp_extra    "frame-ancestors 'none'; base-uri 'self'; form-action 'self'";

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "${csp_default}; ${csp_script}; ${csp_style}; ${csp_img}; ${csp_font}; ${csp_connect}; ${csp_frame}; ${csp_worker}; ${csp_extra}" always;

  # Demo endpoint - prevent mass account creation
  location = /api/v1/users/demo {
    limit_req zone=demo burst=2 nodelay;
    include /etc/nginx/proxy-params.conf;
  }

  # Album media files - per-photo fan-out can spike on editor cold load
  location ~ ^/api/v1/albums/[^/]+/media/[^/]+$ {
    limit_req zone=media_reads burst=120 nodelay;
    include /etc/nginx/proxy-params.conf;
  }

  # Upload bytes go directly to S3; this path only accepts control messages.
  location ^~ /api/v1/users/uploads/ {
    client_max_body_size 1m;
    limit_req zone=general burst=30 nodelay;
    include /etc/nginx/proxy-params.conf;
  }

  # General API - moderate limit
  location /api/ {
    limit_req zone=general burst=30 nodelay;
    include /etc/nginx/proxy-params.conf;
  }

  # Vite-hashed assets - immutable, cache forever
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location / {
    index index.html index.htm;
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }
}
