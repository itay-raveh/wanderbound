<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="256" height="256" rx="56" fill="#1E1E2E"/>

  <!-- Album / open book -->
  <rect x="40" y="48" width="176" height="160" rx="8" fill="#2A2A3E" stroke="#3A3A52" stroke-width="2"/>
  <line x1="128" y1="48" x2="128" y2="208" stroke="#3A3A52" stroke-width="2"/>

  <!-- Travel route across album pages -->
  <path d="M68 172 C88 128, 104 104, 116 112 C128 120, 124 142, 140 128 C156 114, 168 84, 192 76"
        stroke="url(#route)" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- Step markers -->
  <circle cx="68" cy="172" r="7" fill="#4A9EFF"/>
  <circle cx="116" cy="112" r="6" fill="#6DADFF"/>
  <circle cx="140" cy="128" r="6" fill="#C4A832"/>
  <circle cx="192" cy="76" r="7" fill="#FFD700"/>

  <defs>
    <linearGradient id="route" x1="68" y1="172" x2="192" y2="76" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4A9EFF"/>
      <stop offset="1" stop-color="#FFD700"/>
    </linearGradient>
  </defs>
</svg>
