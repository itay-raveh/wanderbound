<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <title>Wanderbound</title>
    <meta name="description" content="Turn your Polarsteps trips into photo albums. Upload your data and get a print-ready album with maps, stats, and layouts." />
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Open Graph (social sharing previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Wanderbound" />
    <meta property="og:description" content="Turn your Polarsteps trips into photo albums" />
    <meta property="og:image" content="%VITE_FRONTEND_URL%/og-image.png" />
    <meta property="og:url" content="%VITE_FRONTEND_URL%/" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Wanderbound" />
    <meta name="twitter:description" content="Turn your Polarsteps trips into photo albums" />
    <meta name="twitter:image" content="%VITE_FRONTEND_URL%/og-image.png" />

    <link rel="canonical" href="%VITE_FRONTEND_URL%/" />

    <link rel="preload" href="/fonts/assistant-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="dns-prefetch" href="https://api.mapbox.com">
    <link rel="preconnect" href="https://tiles.mapbox.com" crossorigin>
  </head>
  <body>
    <script>
      // Apply dark mode before Vue hydrates to prevent a white flash.
      // Mirrors the resolution in `useDarkMode`; Vue takes over reactively after mount.
      (function () {
        var pref = localStorage.getItem("dark-mode") || "system";
        var dark =
          pref === '"dark"' ||
          pref === "dark" ||
          ((pref === '"system"' || pref === "system") &&
            matchMedia("(prefers-color-scheme: dark)").matches);
        document.body.classList.add(dark ? "body--dark" : "body--light");
      })();
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
