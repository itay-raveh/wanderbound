services:
  app:
    image: wanderbound:${WANDERBOUND_VERSION:-dev}
    command: >-
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000
      --proxy-headers --log-config app/core/uvicorn_logging.json"
    ports:
      - "127.0.0.1:8000:8000"

networks:
  backend:
    internal: false
  frontend:
    name: ${COMPOSE_PROJECT_NAME}_frontend
    external: false
